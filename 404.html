<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - SPMB SMAN 1 Lubai Ulu</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Gradient Biru ke Ungu di atas Background Image */
            background: linear-gradient(135deg, rgba(30, 64, 175, 0.9), rgba(126, 34, 206, 0.9)), 
                        url('img/bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .container {
            max-width: 450px;
            width: 90%;
            padding: 40px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .logo {
            max-width: 100px;
            height: auto;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 80px;
            margin: 0;
            color: #1e40af;
            font-weight: 900;
            line-height: 1;
        }

        h2 {
            font-size: 18px;
            color: #64748b;
            margin: 10px 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .divider {
            height: 4px;
            width: 50px;
            background: linear-gradient(to right, #1e40af, #7e22ce);
            margin: 0 auto 25px;
            border-radius: 2px;
        }

        .message {
            font-size: 16px;
            line-height: 1.6;
            color: #1e293b;
            margin-bottom: 25px;
        }

        .status-box {
            background: #f8fafc;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #e2e8f0;
            margin-bottom: 25px;
        }

        .status-label {
            display: block;
            font-size: 13px;
            color: #64748b;
            margin-bottom: 5px;
        }

        .date-placeholder {
            font-size: 20px;
            font-weight: bold;
            color: #7e22ce;
        }

        .footer {
            font-size: 11px;
            color: #94a3b8;
            border-top: 1px solid #f1f5f9;
            padding-top: 20px;
        }

        strong {
            color: #1e40af;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="img/logo.png" alt="Logo Sekolah" class="logo">
        
        <h1>404</h1>
        <h2>Akses Terbatas</h2>
        <div class="divider"></div>
        
        <div class="message">
            Sistem Penerimaan Mahasiswa Baru (SPMB)<br>
            <strong>SMAN 1 LUBAI ULU</strong><br>
            saat ini <strong>BELUM DIBUKA</strong>.
        </div>

        <div class="status-box">
            <span class="status-label">Pendaftaran dibuka pada:</span>
            <span class="date-placeholder">25 Mei 2026</span>
        </div>

        <div class="footer">
            &copy; 2026 SMAN 1 LUBAI ULU. Seluruh Hak Cipta Dilindungi.
        </div>
    </div>

</body>
</html>
